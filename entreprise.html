<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entreprise | Mathis</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0c0c1d;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-main: #f6f2ff;
            --text-sub: rgba(246, 242, 255, 0.78);
            --border: rgba(255, 255, 255, 0.16);
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at 18% 12%, rgba(173, 156, 255, 0.22), transparent 30%),
                radial-gradient(circle at 82% 78%, rgba(124, 211, 255, 0.14), transparent 34%),
                linear-gradient(135deg, #080817 0%, #14142f 52%, #0b1024 100%);
            overflow-x: hidden;
        }

        body.music-theme {
            --bg-color: #121212;
            --card-bg: #000000;
            --text-sub: #b3b3b3;
            background: #121212 !important;
            color: #ffffff;
        }

        .music-theme-toggle,
        .language-toggle {
            position: fixed;
            top: 18px;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            background: rgba(20, 20, 20, 0.62);
            color: white;
            cursor: pointer;
            z-index: 1000;
            display: grid;
            place-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
            transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
        }

        .music-theme-toggle {
            left: 18px;
            width: 48px;
            border-radius: 50%;
            font-size: 1.7rem;
            line-height: 1;
        }

        .language-toggle {
            left: 78px;
            width: 52px;
            border-radius: 24px;
            font-size: 0.86rem;
            font-weight: 700;
        }

        .music-theme-toggle:hover,
        .language-toggle:hover {
            transform: scale(1.06);
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(10, 10, 10, 0.78);
        }

        body.music-theme .music-theme-toggle {
            background: rgba(17, 22, 34, 0.86);
            border-color: rgba(210, 220, 255, 0.72);
            color: #dfe7ff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24), 0 0 18px rgba(210, 220, 255, 0.2);
        }

        body.music-theme .language-toggle {
            background: #000000;
            border-color: #1ed760;
            color: #1ed760;
        }

        .moon-top,
        .moon-bottom {
            position: fixed;
            pointer-events: none;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.72;
            z-index: 0;
            filter: drop-shadow(0 0 34px rgba(210, 220, 255, 0.28));
        }

        .moon-top {
            top: 24px;
            right: 28px;
            width: 145px;
            height: 145px;
            background-image: url("Lune 1 transparent.png");
        }

        .moon-bottom {
            left: 22px;
            bottom: 18px;
            width: 190px;
            height: 190px;
            background-image: url("Lune 2 transparent.png");
        }

        body.music-theme .moon-top,
        body.music-theme .moon-bottom {
            display: none;
        }

        .side-vinyl {
            position: fixed;
            top: 50%;
            right: clamp(-180px, -12vw, -95px);
            width: clamp(260px, 32vw, 430px);
            aspect-ratio: 1;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: 0;
            background:
                radial-gradient(circle at center, #1ed760 0 6%, #000 6.5% 10%, #1db954 10.5% 12%, transparent 12.5%),
                repeating-radial-gradient(circle at center, #030303 0 8px, #111 9px 13px, #050505 14px 18px);
            box-shadow: 0 0 45px rgba(29, 185, 84, 0.22), inset 0 0 42px rgba(255, 255, 255, 0.04);
            transform: translateY(-50%) rotate(var(--side-vinyl-rotation, 0deg));
            will-change: transform;
        }

        body.music-theme .side-vinyl {
            opacity: 1;
        }

        .back-nav {
            position: relative;
            z-index: 2;
            max-width: 1040px;
            margin: 0 auto;
            padding: 92px 24px 0;
        }

        .back-link {
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 600;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(1040px, calc(100% - 32px));
            min-height: 62vh;
            margin: 28px auto 72px;
            padding: clamp(28px, 5vw, 56px);
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        }

        body.music-theme .container {
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 50%, #050505 0 11%, #1ed760 11.5% 15%, #000000 15.5% 19%, transparent 19.5%),
                repeating-radial-gradient(circle at 50% 50%, #000000 0 7px, #101010 8px 12px, #050505 13px 16px);
            border-color: rgba(30, 215, 96, 0.85);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.55), 0 0 28px rgba(29, 185, 84, 0.22);
        }

        body.music-theme .container > * {
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 7vw, 5rem);
            line-height: 0.96;
            margin-bottom: 18px;
        }

        p {
            color: var(--text-sub);
            max-width: 620px;
            font-size: 1.05rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <button class="music-theme-toggle" type="button" aria-label="Activer le theme musique" title="Theme musique">♪</button>
    <button class="language-toggle" type="button" aria-label="Changer la langue" title="Changer la langue">FR</button>
    <div class="moon-top"></div>
    <div class="moon-bottom"></div>
    <div class="side-vinyl" aria-hidden="true"></div>

    <div class="back-nav">
        <a href="index.html" class="back-link" data-i18n="common.back">← Retour au Portfolio</a>
    </div>

    <main class="container">
        <h1 data-i18n="company.title">Entreprise</h1>
        <p data-i18n="company.placeholder">Page en préparation.</p>
    </main>

    <script>
        const savedTheme = localStorage.getItem('portfolio-theme');
        const themeButton = document.querySelector('.music-theme-toggle');
        const languageButton = document.querySelector('.language-toggle');
        const translations = {
            fr: {
                title: 'Entreprise | Mathis',
                'common.back': '← Retour au Portfolio',
                'company.title': 'Entreprise',
                'company.placeholder': 'Page en préparation.'
            },
            en: {
                title: 'Company | Mathis',
                'common.back': '← Back to Portfolio',
                'company.title': 'Company',
                'company.placeholder': 'Page in progress.'
            }
        };

        function applyLanguage(language) {
            const dictionary = translations[language] || translations.fr;
            document.documentElement.lang = language;
            document.title = dictionary.title;
            document.querySelectorAll('[data-i18n]').forEach((element) => {
                const key = element.dataset.i18n;
                if (dictionary[key]) {
                    element.innerHTML = dictionary[key];
                }
            });
            if (languageButton) {
                languageButton.textContent = language.toUpperCase();
            }
            localStorage.setItem('portfolio-language', language);
        }

        const savedLanguage = localStorage.getItem('portfolio-language') || 'fr';
        applyLanguage(savedLanguage);

        languageButton?.addEventListener('click', () => {
            const currentLanguage = localStorage.getItem('portfolio-language') || 'fr';
            applyLanguage(currentLanguage === 'fr' ? 'en' : 'fr');
        });

        if (savedTheme !== 'moon') {
            document.body.classList.add('music-theme');
            themeButton?.setAttribute('aria-label', 'Desactiver le theme musique');
            if (themeButton) themeButton.textContent = '☾';
        } else if (themeButton) {
            themeButton.textContent = '♪';
        }

        themeButton?.addEventListener('click', () => {
            document.body.classList.toggle('music-theme');
            const musicEnabled = document.body.classList.contains('music-theme');
            localStorage.setItem('portfolio-theme', musicEnabled ? 'music' : 'moon');
            themeButton.setAttribute('aria-label', musicEnabled ? 'Desactiver le theme musique' : 'Activer le theme musique');
            themeButton.textContent = musicEnabled ? '☾' : '♪';
        });

        window.addEventListener('scroll', () => {
            document.documentElement.style.setProperty('--side-vinyl-rotation', `${window.pageYOffset * 0.35}deg`);
        });
    </script>
</body>
</html>
